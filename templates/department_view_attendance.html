<!DOCTYPE html>
<html>

<head>

    <title>Department Attendance Records</title>

</head>

<body>

<h1>{{ dept }} Attendance Records</h1>

<table border="1">

    <tr>

        <th>Student Name</th>

        <th>Date</th>

        <th>Status</th>

    </tr>

    {% for record in records %}

    <tr>

        <td>{{ record[0] }}</td>

        <td>{{ record[1] }}</td>

        <td>{{ record[2] }}</td>

    </tr>

    {% endfor %}

</table>

</body>

</html>

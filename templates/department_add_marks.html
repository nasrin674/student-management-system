<!DOCTYPE html>
<html>

<head>

    <title>Add Marks</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="navbar">

    <a href="/dashboard">Dashboard</a>

    <a href="/students">Students</a>

    <a href="/department/{{ dept }}">

        Back

    </a>

    <a href="/logout">Logout</a>

</div>

<div class="container">

    <h1>Add Marks - {{ dept }}</h1>

    <form method="POST" class="marks-form">

        <label>Select Student</label>

        <select name="student_id" required>

            {% for student in students %}

            <option value="{{ student[0] }}">

                {{ student[1] }}

            </option>

            {% endfor %}

        </select>

        <br><br>

        <label>Subject</label>

        <input type="text"
               name="subject"
               placeholder="Enter Subject"
               required>

        <br><br>

        <label>Marks</label>

        <input type="number"
               name="marks"
               placeholder="Enter Marks"
               required>

        <br><br>

        <button type="submit">

            Save Marks

        </button>

    </form>

</div>

</body>

</html>

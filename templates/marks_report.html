<!DOCTYPE html>
<html>

<head>

    <title>Marks Report</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

</head>

<body>

<div class="navbar">

    <a href="/dashboard">Dashboard</a>

    <a href="/students">Students</a>

    <a href="/logout">Logout</a>

</div>

<div class="container">

    <h1>Marks Report</h1>

    <table border="1">

        <tr>

            <th>Student Name</th>

            <th>Average Marks</th>

        </tr>

        {% for report in reports %}

        <tr>

            <td>{{ report[0] }}</td>

            <td>{{ "%.2f"|format(report[1]) }}</td>

        </tr>

        {% endfor %}

    </table>

    <br><br>

    <canvas id="marksChart"
            width="600"
            height="300">
    </canvas>

</div>

<script>

const ctx = document.getElementById('marksChart').getContext('2d');

const marksChart = new Chart(ctx, {

    type: 'bar',

    data: {

        labels:JSON.parse('{{ names | tojson| safe }}'),

        datasets: [{

            label: 'Average Marks',

            data: JSON.parse('{{ averages | tojson | safe }}'),

            backgroundColor: 'rgba(0, 173, 181, 0.7)',

            borderColor: 'rgba(0, 173, 181, 1)',

            borderWidth: 1

        }]

    },

    options: {

        responsive: true,

        scales: {

            y: {

                beginAtZero: true,

                max: 100

            }

        }

    }

});

</script>

</body>

</html>
